<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
  <body>
    <div th:replace="layout :: layout(~{::section})">
      <section>
        <!-- HERO -->
        <section
          class="bg-gradient-to-r from-blue-700 via-blue-600 to-blue-500 text-white py-24"
        >
          <div class="max-w-6xl mx-auto px-6 text-center">
            <h2 class="text-5xl font-bold mb-6">Gestão Olímpica Integrada</h2>

            <p class="text-xl mb-8">
              Sistema para atletas, treinadores e equipe médica
            </p>

            <button
              class="bg-white text-blue-700 px-8 py-3 rounded-lg font-semibold hover:bg-gray-200 transition"
            >
              Acessar Plataforma
            </button>
          </div>
        </section>

        <!-- PORTAIS -->
        <section class="max-w-6xl mx-auto px-6 py-16">
          <h2 class="text-3xl font-bold text-center mb-12">
            Portais de Acesso
          </h2>

          <div class="grid md:grid-cols-3 gap-8">
            <!-- ATLETA -->
            <div
              class="bg-white p-8 rounded-xl shadow border-2 border-transparent hover:border-blue-500 hover:shadow-xl transition"
            >
              <div class="flex justify-center mb-4 text-blue-600">
                <i data-lucide="activity" class="w-10 h-10"></i>
              </div>

              <h3 class="text-xl font-semibold text-center">Atleta</h3>

              <p class="text-gray-500 text-center mt-2">Treinos e resultados</p>

              <div class="flex justify-center">
                <button
                  class="mt-6 bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700"
                >
                  Acessar Portal
                </button>
              </div>
            </div>

            <!-- MÉDICO -->
            <div
              class="bg-white p-8 rounded-xl shadow border-2 border-transparent hover:border-red-500 hover:shadow-xl transition"
            >
              <div class="flex justify-center mb-4 text-red-500">
                <i data-lucide="heart-pulse" class="w-10 h-10"></i>
              </div>

              <h3 class="text-xl font-semibold text-center">Equipe Médica</h3>

              <p class="text-gray-500 text-center mt-2">
                Monitoramento clínico
              </p>

              <div class="flex justify-center">
                <button
                  class="mt-6 bg-red-500 text-white px-6 py-2 rounded-lg hover:bg-red-600"
                >
                  Entrar
                </button>
              </div>
            </div>

            <!-- TREINADOR -->
            <div
              class="bg-white p-8 rounded-xl shadow border-2 border-transparent hover:border-green-500 hover:shadow-xl transition"
            >
              <div class="flex justify-center mb-4 text-green-600">
                <i data-lucide="users" class="w-10 h-10"></i>
              </div>

              <h3 class="text-xl font-semibold text-center">Treinador</h3>

              <p class="text-gray-500 text-center mt-2">Gestão da equipe</p>

              <div class="flex justify-center">
                <button
                  class="mt-6 bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700"
                >
                  Gerir
                </button>
              </div>
            </div>
          </div>
        </section>

        <!-- MODALIDADES -->
        <section class="bg-white py-16">
          <div class="max-w-6xl mx-auto px-6">
            <h2 class="text-3xl font-bold text-center mb-12">
              Modalidades em Foco
            </h2>

            <div class="grid grid-cols-2 md:grid-cols-6 gap-6">
              <div
                class="border border-blue-500 p-6 rounded-lg flex items-center justify-center text-center"
              >
                🏊 Natação
              </div>

              <div
                class="border border-blue-500 p-6 rounded-lg flex items-center justify-center text-center"
              >
                🏃 Atletismo
              </div>

              <div
                class="border border-blue-500 p-6 rounded-lg flex items-center justify-center text-center"
              >
                🏀 Basquetebol
              </div>

              <div
                class="border border-blue-500 p-6 rounded-lg flex items-center justify-center text-center"
              >
                🚴 Ciclismo
              </div>

              <div
                class="border border-blue-500 p-6 rounded-lg flex items-center justify-center text-center"
              >
                🏐 Voleibol
              </div>

              <div
                class="border border-blue-500 p-6 rounded-lg flex items-center justify-center text-center"
              >
                ⚔ Esgrima
              </div>
            </div>
          </div>
        </section>
      </section>
    </div>
  </body>
</html>
