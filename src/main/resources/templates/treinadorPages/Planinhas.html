<!DOCTYPE html>
<html lang="pt-Br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./css/output.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex flex-col xl:flex-row bg-black font-serif w-full min-h-screen">
    <!-- Adicionado: sticky top-0 z-50 para fixar no topo e ficar acima do conteúdo -->
    <header class="w-full h-14 bg-amber-500 xl:h-screen xl:w-1/5 max-h-screen sticky top-0 z-50">
        <ul class="flex justify-around items-center xl:flex-col mt-4 xl:mt-0 px-3.5 xl:px-0 gap-3.5 xl:gap-0 h-full">

            <li class="w-full flex xl:h-28 xl:text-2xl xl:bg-black">
                <a href="#" class="flex items-center xl:px-3.5 gap-5">
                    <img  src="img/user.svg" class="w-12 hidden xl:flex">
                    <p class="text-white duration-500 font-extrabold">NOME</p>
                </a>
            </li>


            <li class="w-full flex xl:justify-start items-center xl:hover:bg-black/30 xl:h-11 xl:text-2xl xl:px-4">
                <a  th:href="@{/treinador}" class="flex items-center gap-2">
                    <img th:src="@{/iconsTrei/dash.svg}"  class="hidden xl:flex w-6">
                    <p class="xl:hover:text-black hover:text-amber-50 duration-500 font-extrabold">DASHBOARD</p>
                </a>
            </li>

            <li class="w-full flex xl:justify-start items-center bg-amber-600  xl:h-11 xl:text-2xl xl:px-4">
                <a href="" class="flex items-center gap-2">
                    <img th:src="@{/iconsTrei/trofeu.svg}" class="hidden xl:flex w-6">
                    <p class="xl:hover:text-black hover:text-amber-50 duration-500 font-extrabold">PLANILHA</p>
                </a>
            </li>

            <li class="w-full flex xl:justify-start items-center xl:hover:bg-black/30 xl:h-11 xl:text-2xl xl:px-4">
                <a th:href="@{/treinador/perfil}" class="flex items-center gap-2">
                    <img th:src="@{/iconsTrei/user_id.svg}"  class="hidden xl:flex w-6">
                    <p class="xl:hover:text-black hover:text-amber-50 duration-500 font-extrabold">PERFIL</p>
                </a>
            </li>

            <li class="w-full flex xl:justify-start items-center xl:hover:bg-black/30 xl:h-11 xl:text-2xl xl:px-4">
                <a href="#" class="flex items-center gap-2">
                    <img th:src="@{/iconsTrei/calen.svg}"  class="hidden xl:flex w-6">
                    <p class="xl:hover:text-black hover:text-amber-50 duration-500 font-extrabold">TREINOS</p>
                </a>
            </li>

            <li class="w-full flex xl:justify-start items-center xl:bg-red-600 xl:h-11 xl:text-2xl xl:px-4 xl:mt-auto">
                <a  th:href="@{/home}" class="flex items-center gap-2">
                    <img th:src="@{/iconsTrei/sair.svg}" class="hidden xl:flex w-6">
                    <p class="xl:hover:text-black hover:text-red-700 duration-500 font-extrabold">SAIR</p>
                </a>
            </li>
        </ul>
    </header>

    <main class="w-full flex flex-col gap-14">
        <div class="flex bg-amber-50 py-4 text-2xl font-black px-2 justify-center xl:justify-start">
            <h2 class="text-2xl px-4 font-bold">02 . Painel do Treinador</h2>
        </div>
        <aside class="flex flex-col xl:flex-row bg-white/40">
            <section class=" w-full px-10 py-3">
                <section class="w-full bg-amber-50 rounded-2xl  px-3.5 py-2.5">
                    <div class="text-2xl">
                        <span>+</span>
                        <span>NOVA PLANILHAS DE TREINOS</span>
                    </div>

                    <section class="w-full flex flex-col xl:flex-row gap-7">
                        <div class="w-full">
                            <div class="flex flex-col">
                                <label for="" class="mx-2 font-extrabold">NOME DA LISTA/PLANO</label>
                                <input type="text" name="" id=""
                                    class="w-full h-10 bg-gray-600/55 text-amber-50 rounded-2xl px-6 font-extrabold">
                            </div>

                            <div class="flex flex-col mt-4">
                                <label for="" class="mx-2 font-extrabold">SELECIONAR ATLETA</label>
                                <select name="" id=""
                                    class="w-full h-10 bg-gray-600/55 text-amber-50 rounded-2xl px-6 font-extrabold">
                                    <option value="">NOMES</option>
                                    <option value="">NOMES 1</option>
                                    <option value="">NOMES 2</option>
                                </select>
                            </div>
                        </div>

                        <div class="w-full">
                            <div class="flex flex-col">
                                <label for="" class="mx-2 font-extrabold">NOME DA LISTA/PLANO</label>
                                <textarea name="" id=""
                                    class="w-full h-28 bg-gray-600/55 text-amber-50 rounded-2xl px-6 py-4 font-extrabold resize-none outline-none">
                                </textarea>
                            </div>

                        </div>


                    </section>

                    <div class="w-full">
                        <div class="flex flex-col xl:mt-12 mt-3.5 ">
                            <label for="" class="mx-2 font-extrabold">NOME DA LISTA/PLANO</label>
                            <a href=""
                                class="bg-amber-400 hover:bg-amber-300 duration-500 py-4 px-2.5 rounded-2xl text-center font-extrabold text-white xl:w-1/5 ">
                                <p>CADASTRO</p>
                            </a>
                        </div>

                    </div>

                </section>


            </section>


        </aside>

        <!---pppppppp-->

        <aside class="flex flex-col xl:flex-row bg-white/40">
            <section class=" w-full xl:flex-row px-10 py-3 flex flex-col justify-between gap-5 xl:gap-3">
                <section class="w-full xl:w-1/3 bg-amber-50 rounded-2xl  px-3.5 py-2.5">
                    <div>
                        <img th:src="@{/iconsTrei/docs.svg}"  alt="" class="bg-amber-400 p-3 rounded-2xl">
                    </div>
                    <div class="flex flex-col gap-3">
                        <h3 class="text-3xl font-extrabold mt-3.5">NOME DA LISTA</h3>
                        <p class="text-amber-700 font-extrabold font-extrabold text-2xl">Nome do atleta</p>
                        <p>Nome Treinador</p>
                        <p>sexo atleta</p>
                        <p class="text-green-600 font-extrabold">CPF: <span>XXXXX-XXX-XX</span></p>
                    </div>
                </section>

                <!---->


                   <section class="w-full xl:w-1/3 bg-amber-50 rounded-2xl  px-3.5 py-2.5">
                    <div>
                        <img th:src="@{/iconsTrei/docs.svg}"  alt="" class="bg-amber-400 p-3 rounded-2xl">
                    </div>
                    <div class="flex flex-col gap-3">
                        <h3 class="text-3xl font-extrabold mt-3.5">NOME DA LISTA</h3>
                        <p class="text-amber-700 font-extrabold font-extrabold text-2xl">Nome do atleta</p>
                        <p>Nome Treinador</p>
                        <p>sexo atleta</p>
                        <p class="text-green-600 font-extrabold">CPF: <span>XXXXX-XXX-XX</span></p>
                    </div>
                </section>


                


            </section>


            <!---->

        </aside>
    </main>
</body>
</html>
