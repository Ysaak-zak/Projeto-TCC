<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" th:href="@{/icon/iconFun.png}">
</head>

<body class="flex flex-col xl:flex-row bg-black font-serif w-full min-h-screen">
    <header class="w-full h-14 bg-amber-500 xl:h-screen xl:w-1/5 sticky top-0 z-50">
        <ul class="flex justify-around items-center xl:flex-col mt-4 xl:mt-0 px-3.5 xl:px-0 gap-3.5 xl:gap-0 mt-auto  xl:h-full ">

            <li class="w-full flex xl:h-28 xl:text-2xl xl:bg-black">
                <a href="#" class="flex items-center xl:px-3.5 gap-5">
                    <img th:src="@{/img/user.svg}" class="w-12 hidden xl:flex">
                    <p class="text-white duration-500 font-extrabold">NOME</p>
                </a>
            </li>

            <li class="w-full flex xl:justify-start items-center bg-amber-600  xl:h-11 xl:text-2xl xl:px-4">
                <a href="#" class="flex items-center gap-2">
                  
                    <img th:src="@{/img/dash.svg}" class="hidden lg:flex w-6">
                    <p class="xl:hover:text-black hover:text-amber-50 duration-500 font-extrabold">DASHBOARD</p>
                </a>
            </li>

            <li class="w-full flex xl:justify-start items-center xl:hover:bg-black/30 xl:h-11 xl:text-2xl xl:px-4">
                <a th:href="@{/treinador/planilha}" class="flex items-center gap-2">
                    <img  th:src="@{/img/trofeu.svg}" class="hidden xl:flex w-6">
                    <p class="xl:hover:text-black hover:text-amber-50 duration-500 font-extrabold">PLANILHAS</p>
                </a>
            </li>

            <li class="w-full flex xl:justify-start items-center xl:hover:bg-black/30 xl:h-11 xl:text-2xl xl:px-4">
           <a th:href="@{/treinador/perfil}" class="flex items-center gap-2">
                    <img th:src="@{/img/user_id.svg}" class="hidden xl:flex w-6">
                    <p class="xl:hover:text-black hover:text-amber-50 duration-500 font-extrabold">PERFIL</p>
                </a>
            </li>

            <li class="w-full flex xl:justify-start items-center xl:hover:bg-black/30 xl:h-11 xl:text-2xl xl:px-4">
                <a href="#" class="flex items-center gap-2">
                    <img th:src="@{/img/calen.svg}" class="hidden xl:flex w-6">
                    <p class="xl:hover:text-black hover:text-amber-50 duration-500 font-extrabold">TREINOS</p>
                </a>
            </li>

            <li class="w-full flex xl:justify-start items-center xl:bg-red-600 xl:h-11 xl:text-2xl xl:px-4 xl:mt-auto">
                <a  th:href="@{/home}" class="flex items-center gap-2">
                    <img th:src="@{/img/sair.svg}"  class="hidden xl:flex w-6">
                    <p class="xl:hover:text-black hover:text-red-700 duration-500 font-extrabold">SAIR</p>
                </a>
            </li>
        </ul>
    </header>

    <main class="w-full">
        <h1 class="text-3xl font-bold mb-4 bg-amber-50  text-center px-2 py-3 ">Painel do Treinador</h1>
        <section class="w-full flex flex-col xl:flex-row  justify-between xl:px-16 px-0 gap-4 ">
            <div
                class="w-full bg-amber-50 xl:rounded-l-4xl border-l-8 border-indigo-500 flex flex-col items-center gap-7 py-3.5 xl:w-1/3">
                <h3 class="text-3xl font-extrabold">MEUS ATLETAS</h3>
                <div class="flex justify-center items-center">
                    <h2 class="text-3xl text-green-500 font-bold" th:text="${vinculados_count}" ></h2>
                </div>
            </div>


            <div
                class="w-full bg-amber-50 xl:rounded-l-4xl border-l-8 border-indigo-500 flex flex-col items-center gap-7 py-3.5 xl:w-1/3">
                <h3 class="text-3xl font-extrabold">ATLETAS NOVOS</h3>
                <div class="flex justify-center items-center">
                    <h2 class="text-3xl text-green-500 font-bold" th:text="${atleta_sem_Vinculacao}" ></h2>
                </div>
            </div>


        </section>

        <div class="flex px-4 mt-6 gap-3">
            <img src="img/user_max.svg" alt="">
            <h2 class="text-amber-600 text-2xl font-extrabold">Adcionar novos Atletas </h2>
        </div>

        <div class="w-full overflow-x-auto border border-gray-200 rounded-lg mt-3 ">
            <table class="w-full text-sm text-left">
                <thead class="bg-gray-50 border-b border-gray-200 text-gray-700 uppercase font-semibold">
                    <tr>
                        <th class="px-4 py-3">ID</th>
                        <th class="px-4 py-3">NOMES</th>
                        <th class="px-4 py-3">CPF</th>
                        <th class="px-4 py-3">SEXO</th>
                        <th class="px-4 py-3">G-MAIL</th>
                        <th class="px-4 py-3">LOCALIZAÇÃO</th>
                        <th class="px-4 py-3 text-right">Ação</th>
                    </tr>
                </thead>

                <tbody class="divide-y divide-gray-200">
                    <tr class="" th:each="atleta : ${listaAtletas}">
                        <td class="px-4 py-3 text-amber-50 font-bold flex items-center">
                            <span th:text="${atleta.id}"></span>
                        </td>
                        <td class="px-4 py-3 text-amber-50 font-bold" th:text="${atleta.per_nome}"></td>
                        <td class="px-4 py-3 text-amber-50 font-bold" th:text="${atleta.cpf}"></td>
                        <td class="px-4 py-3 text-amber-50 font-bold" th:text="${atleta.sexo}"></td>
                        <td class="px-4 py-3 text-amber-50 font-bold" th:text="${atleta.email}"></td>
                        <td class="px-4 py-3 text-amber-50 font-bold" th:text="${atleta.cidade}"></td>
                        
                        <td class="px-4 py-3 text-right">
                            <form th:action="@{/treinador/{tId}/vincular-atleta/{aId}(tId=${treinador.id}, aId=${atleta.id})}" method="POST">
                                <button type="submit" class="text-amber-50 bg-amber-500 hover:bg-amber-600 py-1.5 px-4 rounded-2xl font-bold transition-colors duration-200">
                                    Vincular
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </main>
</body>
</html>
