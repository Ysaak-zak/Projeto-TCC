<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bem-vindo Atleta</title>
    <style>
        body {
            background-color: #000;
            color: #d4ff00; /* Verde limão esportivo */
            font-family: 'Arial Black', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-transform: uppercase;
        }
        .container {
            text-align: center;
            border: 2px solid #d4ff00;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(212, 255, 0, 0.2);
        }
        h1 {
            font-size: 3rem;
            margin: 0;
            letter-spacing: -2px;
        }
        p {
            color: white;
            letter-spacing: 5px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <p>SISTEMA DE PERFORMANCE</p>
        <h1>BEM-VINDO, ATLETA</h1>
    </div>

</body>
</html>
